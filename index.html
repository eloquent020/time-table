<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3,4과학 / 1,2체육 주간 시간표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0d1b2a;
    --bg2: #112236;
    --bg3: #1a3050;
    --card: #162840;
    --card2: #1e3a56;
    --border: #2a4a6a;
    --accent: #f5a623;
    --accent2: #4fc3f7;
    --text: #e8f4fd;
    --text2: #8ab4cc;
    --빛: #4fc3f7;
    --샘: #a8e6cf;
    --보충: #f48fb1;
    --holiday: #ef9a9a;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-weight: 900;
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 16px;
    text-shadow: 0 0 20px rgba(79,195,247,0.3);
  }

  .action-bar {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    max-width: 1400px;
    margin: 0 auto 14px;
  }

  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 0.83rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-accent  { background: var(--accent);  color: #000; }
  .btn-accent:hover  { background: #ffba4a; transform: translateY(-1px); }
  .btn-accent2 { background: var(--accent2); color: #000; }
  .btn-accent2:hover { background: #81d4fa; transform: translateY(-1px); }
  .btn-ghost   { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover   { background: var(--card2); color: var(--text); }

  /* ── 레이아웃 ── */
  .main-layout {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── 달력 ── */
  .calendar-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    min-width: 250px;
    box-shadow: var(--shadow);
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .cal-header span { font-weight: 700; font-size: 0.95rem; color: var(--accent2); }

  .cal-nav {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 3px 9px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.15s;
  }
  .cal-nav:hover { background: var(--card2); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }

  .cal-day-label {
    font-size: 0.68rem;
    color: var(--text2);
    padding: 3px 0;
    font-weight: 600;
  }
  .cal-day-label.sun { color: var(--holiday); }
  .cal-day-label.sat { color: var(--accent2); }

  .cal-day {
    padding: 5px 2px;
    border-radius: 5px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--text2);
    line-height: 1.3;
    position: relative;
  }
  .cal-day:hover { background: var(--bg3); color: var(--text); }
  .cal-day.today { background: var(--accent); color: #000; font-weight: 700; }
  .cal-day.selected-week { background: rgba(79,195,247,0.15); color: var(--accent2); }
  .cal-day.other-month { opacity: 0.25; pointer-events: none; }
  .cal-day.sunday { color: var(--holiday); }
  .cal-day.saturday { color: var(--accent2); }
  .cal-day.holiday { color: var(--holiday) !important; }
  .cal-day.holiday::after {
    content: '●';
    font-size: 0.4rem;
    position: absolute;
    bottom: 1px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--holiday);
  }

  /* ── 시간표 영역 ── */
  .timetable-section { flex: 1; min-width: 0; }

  .week-label {
    text-align: center;
    font-size: 0.83rem;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .timetable-wrap { overflow-x: auto; }

  table.tt {
    width: 100%;
    border-collapse: separate;
    border-spacing: 3px;
    min-width: 580px;
  }

  table.tt th {
    background: var(--bg3);
    color: var(--text2);
    font-size: 0.76rem;
    font-weight: 600;
    padding: 7px 4px;
    border-radius: 8px;
    text-align: center;
  }
  table.tt th.today-col {
    background: rgba(79,195,247,0.15);
    color: var(--accent2);
    border: 2px solid var(--accent2);
  }
  table.tt th.holiday-col {
    background: rgba(239,154,154,0.08);
    color: var(--holiday);
    opacity: 0.6;
  }

  .time-cell {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text2);
    white-space: nowrap;
    padding: 4px 5px;
    min-width: 60px;
  }
  .time-cell .period { font-weight: 700; font-size: 0.8rem; color: var(--text); display: block; }

  td.lunch-row {
    text-align: center;
    color: var(--accent);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 4px;
    background: rgba(245,166,35,0.07);
    border-radius: 6px;
  }

  td.class-cell {
    text-align: center;
    border-radius: 9px;
    padding: 8px 3px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.12s;
    min-width: 78px;
    user-select: none;
  }
  td.class-cell:hover:not(.holiday-cell) { filter: brightness(1.25); transform: scale(1.04); }
  td.class-cell.today-col { border: 2px solid var(--accent2); }

  /* 공휴일 셀: 클릭 불가, 빗금 표시 */
  td.holiday-cell {
    background: repeating-linear-gradient(
      45deg,
      rgba(239,154,154,0.04),
      rgba(239,154,154,0.04) 4px,
      transparent 4px,
      transparent 10px
    ) !important;
    color: var(--holiday) !important;
    opacity: 0.45;
    cursor: not-allowed !important;
    font-size: 0.7rem;
    font-weight: 400;
  }
  td.holiday-cell:hover { filter: none !important; transform: none !important; }

  .cls-빛   { background: rgba(79,195,247,0.17);  color: var(--빛); }
  .cls-샘   { background: rgba(168,230,207,0.17); color: var(--샘); }
  .cls-보충 { background: rgba(244,143,177,0.17); color: var(--보충); }
  .cls-empty { background: var(--card); color: rgba(138,180,204,0.4); }

  /* ── 메모 영역 ── */
  .memo-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-top: 16px;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
  }

  .memo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .memo-header h2 { font-size: 0.95rem; color: var(--accent2); font-weight: 700; }

  .memo-actions { display: flex; gap: 8px; align-items: center; }

  .memo-saved-indicator {
    font-size: 0.72rem;
    color: var(--샘);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .memo-saved-indicator.show { opacity: 1; }

  textarea#memo-input {
    width: 100%;
    min-height: 90px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    padding: 10px 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea#memo-input:focus { border-color: var(--accent2); }
  textarea#memo-input::placeholder { color: var(--text2); opacity: 0.5; }

  /* ── 합계 ── */
  .summary-section {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
  }

  .summary-section h2 { font-size: 0.95rem; font-weight: 700; color: var(--accent2); margin-bottom: 14px; letter-spacing: 1px; }

  .summary-tabs { display: flex; gap: 7px; margin-bottom: 14px; }

  .sum-tab {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .sum-tab.active { background: var(--accent2); color: #000; border-color: var(--accent2); }

  .summary-grid { display: flex; gap: 10px; flex-wrap: wrap; }

  .sum-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 12px 18px;
    min-width: 90px;
    text-align: center;
  }
  .sum-card .sum-label { font-size: 0.75rem; color: var(--text2); margin-bottom: 5px; }
  .sum-card .sum-val   { font-size: 1.5rem; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
  .sum-빛   { color: var(--빛); }
  .sum-샘   { color: var(--샘); }
  .sum-보충 { color: var(--보충); }

  /* ── 팝업 ── */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .popup-overlay.show { display: flex; }

  .popup {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    min-width: 200px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .popup h3 { font-size: 0.83rem; color: var(--text2); margin-bottom: 12px; text-align: center; }
  .popup-options { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .popup-btn {
    padding: 10px 8px;
    border-radius: 9px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    transition: all 0.12s;
    text-align: center;
  }
  .popup-btn:hover { filter: brightness(1.3); transform: scale(1.05); }
  .pb-빛   { background: rgba(79,195,247,0.15);  color: var(--빛); }
  .pb-샘   { background: rgba(168,230,207,0.15); color: var(--샘); }
  .pb-보충 { background: rgba(244,143,177,0.15); color: var(--보충); }
  .pb-empty { background: var(--bg3); color: var(--text2); }
  .popup-cancel {
    width: 100%;
    margin-top: 9px;
    padding: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.83rem;
  }

  /* ── 연간/메모 출력 모달 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    overflow-y: auto;
    padding: 20px;
  }
  .modal-overlay.show { display: block; }

  .modal-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .modal-box h2 { font-size: 1.1rem; font-weight: 700; color: var(--accent2); margin-bottom: 16px; }

  .modal-footer { margin-top: 16px; display: flex; gap: 10px; }

  .annual-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.73rem;
    margin-bottom: 12px;
  }
  .annual-table th, .annual-table td {
    border: 1px solid var(--border);
    padding: 4px 6px;
    text-align: center;
    white-space: nowrap;
  }
  .annual-table th { background: var(--bg3); color: var(--text2); font-weight: 600; }
  .cell-빛   { color: var(--빛) !important; }
  .cell-샘   { color: var(--샘) !important; }
  .cell-보충 { color: var(--보충) !important; }

  /* 메모 모달 */
  .memo-list-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .memo-list-item .memo-week-title { font-size: 0.8rem; color: var(--accent2); font-weight: 700; margin-bottom: 5px; }
  .memo-list-item .memo-text { font-size: 0.83rem; color: var(--text); white-space: pre-wrap; line-height: 1.6; }
</style>
</head>
<body>

<h1>3,4과학 / 1,2체육 주간 시간표</h1>

<div class="action-bar">
  <button class="btn btn-ghost" onclick="showMemoModal()">📝 메모 전체보기 / 출력</button>
  <button class="btn btn-accent2" onclick="saveMemoFile()">💾 메모 파일 저장</button>
  <button class="btn btn-accent" onclick="showAnnual()">📋 연간 시간표 출력</button>
</div>

<div class="main-layout">
  <!-- 달력 -->
  <div class="calendar-panel">
    <div class="cal-header">
      <button class="cal-nav" onclick="moveMonth(-1)">◀</button>
      <span id="cal-title"></span>
      <button class="cal-nav" onclick="moveMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- 시간표 -->
  <div class="timetable-section">
    <div class="week-label" id="week-label"></div>
    <div class="timetable-wrap">
      <table class="tt" id="tt"></table>
    </div>
  </div>
</div>

<!-- 주별 메모 -->
<div class="memo-section">
  <div class="memo-header">
    <h2 id="memo-week-title">📝 이번 주 메모</h2>
    <div class="memo-actions">
      <span class="memo-saved-indicator" id="memo-saved-indicator">✓ 저장됨</span>
    </div>
  </div>
  <textarea id="memo-input" placeholder="이번 주 특이사항, 수업 변경 내용, 메모 등을 자유롭게 입력하세요..."></textarea>
</div>

<!-- 합계 -->
<div class="summary-section">
  <h2>📊 수업 합계</h2>
  <div class="summary-tabs">
    <button class="sum-tab active" onclick="setSumTab('week')">이번 주</button>
    <button class="sum-tab" onclick="setSumTab('sem1')">1학기 (3/3~7/22)</button>
    <button class="sum-tab" onclick="setSumTab('sem2')">2학기 (8/14~12/31)</button>
  </div>
  <div class="summary-grid" id="summary-grid"></div>
</div>

<!-- 셀 편집 팝업 -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopupBg(event)">
  <div class="popup">
    <h3 id="popup-title">수업 선택</h3>
    <div class="popup-options" id="popup-options"></div>
    <button class="popup-cancel" onclick="closePopup()">취소</button>
  </div>
</div>

<!-- 연간 출력 모달 -->
<div class="modal-overlay" id="annual-modal">
  <div class="modal-box">
    <h2>📋 연간 시간표</h2>
    <div id="annual-content"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('annual-modal').classList.remove('show')">닫기</button>
      <button class="btn btn-accent" onclick="printAnnual()">🖨️ 인쇄</button>
    </div>
  </div>
</div>

<!-- 메모 전체보기 모달 -->
<div class="modal-overlay" id="memo-modal">
  <div class="modal-box">
    <h2>📝 주별 메모 전체보기</h2>
    <div id="memo-modal-content"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('memo-modal').classList.remove('show')">닫기</button>
      <button class="btn btn-accent2" onclick="saveMemoFile()">💾 파일 저장</button>
      <button class="btn btn-accent" onclick="printMemos()">🖨️ 인쇄</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// 공휴일
// ══════════════════════════════════════════════════════
const HOLIDAYS = new Set([
  '2026-03-02', // 삼일절 대체공휴일
  '2026-05-01', // 노동절
  '2026-05-04', // 학교장재량휴업일
  '2026-05-05', // 어린이날
  '2026-05-25', // 부처님오신날
  '2026-06-03', // 지방선거
  '2026-07-17', // 제헌절
  '2026-08-17', // 광복절 대체공휴일
  '2026-09-24', // 추석연휴
  '2026-09-25', // 추석연휴
  '2026-10-05', // 추석 대체공휴일
  '2026-10-09', // 한글날
  '2026-12-25', // 성탄절
]);

const HOLIDAY_NAMES = {
  '2026-03-02': '대체공휴일',
  '2026-05-01': '노동절',
  '2026-05-04': '재량휴업',
  '2026-05-05': '어린이날',
  '2026-05-25': '부처님오신날',
  '2026-06-03': '지방선거',
  '2026-07-17': '제헌절',
  '2026-08-17': '대체공휴일',
  '2026-09-24': '추석',
  '2026-09-25': '추석',
  '2026-10-05': '대체공휴일',
  '2026-10-09': '한글날',
  '2026-12-25': '성탄절',
};

// ══════════════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════════════
const CLASSES = ['1빛','2빛','3빛','4빛','1샘','2샘','4샘','보충','-'];

const PERIODS = [
  { label:'1교시', time:'09:10~09:50' },
  { label:'2교시', time:'10:00~10:40' },
  { label:'3교시', time:'11:00~11:40' },
  { label:'점심',  time:'' },
  { label:'4교시', time:'12:30~13:10' },
  { label:'5교시', time:'13:20~14:00' },
  { label:'6교시', time:'14:10~16:40' },
  { label:'7교시', time:'16:50~17:30' },
];

const DAY_FULL = ['월요일','화요일','수요일','목요일','금요일'];
const DAYS     = ['월','화','수','목','금'];

// 기본 시간표: periodIdx → { colIdx: className }
const DEFAULT_TT = {
  0: { 1:'4빛', 2:'3빛', 3:'4빛', 4:'3빛' },
  1: { 1:'4빛', 2:'1빛', 3:'1샘', 4:'3빛' },
  2: { 4:'4샘' },
  4: { 0:'1샘', 1:'1빛', 2:'2빛', 3:'2빛', 4:'2샘' },
  5: { 1:'4샘', 3:'2샘' },
  6: { 1:'4샘' },
  7: {},
};

// ══════════════════════════════════════════════════════
// 상태
// ══════════════════════════════════════════════════════
const today = new Date();
let viewDate = new Date(today);
let selectedMonday = getMonday(today);

const scheduleData = {}; // key: "YYYY-MM-DD_pi" → className
const memoData     = {}; // key: "YYYY-MM-DD" (monday) → string
let memoTimer = null;

// ══════════════════════════════════════════════════════
// 날짜 유틸
// ══════════════════════════════════════════════════════
function getMonday(d) {
  const dt = new Date(d);
  dt.setHours(0,0,0,0);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return dt;
}

function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  return dt;
}

function fmt(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function sameDay(a,b) {
  return a.getFullYear()===b.getFullYear() &&
         a.getMonth()===b.getMonth() &&
         a.getDate()===b.getDate();
}

function mondayKey(d) { return fmt(getMonday(d)); }

// ══════════════════════════════════════════════════════
// 시간표 데이터
// ══════════════════════════════════════════════════════
function getCell(dateStr, pi) {
  const key = `${dateStr}_${pi}`;
  if (scheduleData[key] !== undefined) return scheduleData[key];
  const dt = new Date(dateStr);
  const col = dt.getDay() - 1;
  if (col < 0 || col > 4) return '-';
  return (DEFAULT_TT[pi] && DEFAULT_TT[pi][col]) || '-';
}

function setCell(dateStr, pi, val) {
  scheduleData[`${dateStr}_${pi}`] = val;
}

// ══════════════════════════════════════════════════════
// 달력
// ══════════════════════════════════════════════════════
function renderCalendar() {
  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();
  document.getElementById('cal-title').textContent = `${year}년 ${month+1}월`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  [['일','sun'],['월',''],['화',''],['수',''],['목',''],['금',''],['토','sat']].forEach(([l,c]) => {
    const el = document.createElement('div');
    el.className = `cal-day-label ${c}`;
    el.textContent = l;
    grid.appendChild(el);
  });

  const firstDow   = new Date(year, month, 1).getDay();
  const daysInMon  = new Date(year, month+1, 0).getDate();
  const prevDays   = new Date(year, month, 0).getDate();

  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - firstDow + 1 + i;
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMon; d++) {
    const dt  = new Date(year, month, d);
    const dow = dt.getDay();
    const ds  = fmt(dt);
    let cls = 'cal-day';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    if (HOLIDAYS.has(ds)) cls += ' holiday';
    if (sameDay(dt, today)) cls += ' today';
    if (fmt(getMonday(dt)) === fmt(selectedMonday)) cls += ' selected-week';

    const el = document.createElement('div');
    el.className = cls;
    el.textContent = d;
    if (HOLIDAYS.has(ds)) el.title = HOLIDAY_NAMES[ds] || '공휴일';
    el.onclick = () => {
      selectedMonday = getMonday(dt);
      renderCalendar();
      renderTimetable();
      renderMemoArea();
      renderSummary();
    };
    grid.appendChild(el);
  }
}

function moveMonth(dir) {
  viewDate.setMonth(viewDate.getMonth() + dir);
  renderCalendar();
}

// ══════════════════════════════════════════════════════
// 시간표
// ══════════════════════════════════════════════════════
function renderTimetable() {
  const mon = selectedMonday;
  const fri = addDays(mon, 4);
  document.getElementById('week-label').textContent =
    `${fmt(mon)} (월) ~ ${fmt(fri)} (금)`;

  const table = document.getElementById('tt');
  table.innerHTML = '';

  // 헤더
  const thead = document.createElement('thead');
  let hr = '<tr><th style="min-width:60px">시간</th>';
  for (let d = 0; d < 5; d++) {
    const dt  = addDays(mon, d);
    const ds  = fmt(dt);
    const isT = sameDay(dt, today);
    const isH = HOLIDAYS.has(ds);
    const hName = HOLIDAY_NAMES[ds] || '';
    let cls = isT ? 'today-col' : isH ? 'holiday-col' : '';
    hr += `<th class="${cls}">
      ${DAY_FULL[d]}<br>
      <small style="font-weight:400;font-size:0.65rem;opacity:0.75">${ds.slice(5)}</small>
      ${isH ? `<br><small style="font-size:0.6rem;color:var(--holiday)">${hName}</small>` : ''}
    </th>`;
  }
  hr += '</tr>';
  thead.innerHTML = hr;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  PERIODS.forEach((p, pi) => {
    const tr = document.createElement('tr');

    // 시간 컬럼
    if (p.label === '점심') {
      tr.innerHTML = '<td class="time-cell"><span class="period" style="color:var(--accent)">점심</span></td>';
    } else {
      tr.innerHTML = `<td class="time-cell"><span class="period">${p.label}</span>${p.time}</td>`;
    }

    for (let d = 0; d < 5; d++) {
      const dt  = addDays(mon, d);
      const ds  = fmt(dt);
      const isT = sameDay(dt, today);
      const isH = HOLIDAYS.has(ds);

      if (p.label === '점심') {
        const td = document.createElement('td');
        td.className = 'lunch-row' + (isT ? ' today-col' : '');
        if (isH) { td.style.opacity = '0.25'; }
        td.textContent = '점심시간';
        tr.appendChild(td);
        continue;
      }

      const td = document.createElement('td');

      if (isH) {
        // 공휴일 - 클릭 불가, 빗금
        td.className = 'class-cell holiday-cell' + (isT ? ' today-col' : '');
        td.textContent = HOLIDAY_NAMES[ds] || '휴일';
      } else {
        const val = getCell(ds, pi);
        td.className = `class-cell ${getCellCls(val)}` + (isT ? ' today-col' : '');
        td.textContent = val;
        td.onclick = () => openPopup(ds, pi, d, p.label);
      }

      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
}

function getCellCls(val) {
  if (!val || val === '-') return 'cls-empty';
  if (val.includes('빛')) return 'cls-빛';
  if (val.includes('샘')) return 'cls-샘';
  if (val === '보충')     return 'cls-보충';
  return 'cls-empty';
}

// ══════════════════════════════════════════════════════
// 팝업
// ══════════════════════════════════════════════════════
let editTarget = null;

function openPopup(ds, pi, dayIdx, periodLabel) {
  editTarget = { ds, pi };
  const cur = getCell(ds, pi);
  document.getElementById('popup-title').textContent =
    `${DAY_FULL[dayIdx]} ${periodLabel}`;

  const opts = document.getElementById('popup-options');
  opts.innerHTML = '';

  CLASSES.forEach(cls => {
    if (cls === cur) return;
    const btn = document.createElement('button');
    let c = 'popup-btn pb-empty';
    if (cls.includes('빛')) c = 'popup-btn pb-빛';
    else if (cls.includes('샘')) c = 'popup-btn pb-샘';
    else if (cls === '보충') c = 'popup-btn pb-보충';
    btn.className = c;
    btn.textContent = cls === '-' ? '없음 (-)' : cls;
    btn.onclick = () => {
      setCell(editTarget.ds, editTarget.pi, cls);
      closePopup();
      renderTimetable();
      renderSummary();
    };
    opts.appendChild(btn);
  });

  document.getElementById('popup-overlay').classList.add('show');
}

function closePopupBg(e) {
  if (e.target === document.getElementById('popup-overlay')) closePopup();
}
function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
  editTarget = null;
}

// ══════════════════════════════════════════════════════
// 메모
// ══════════════════════════════════════════════════════
function memoKey() { return fmt(selectedMonday); }

function renderMemoArea() {
  const key = memoKey();
  const fri = addDays(selectedMonday, 4);
  document.getElementById('memo-week-title').textContent =
    `📝 ${fmt(selectedMonday)} ~ ${fmt(fri)} 메모`;
  document.getElementById('memo-input').value = memoData[key] || '';
}

function setupMemoAutoSave() {
  const ta = document.getElementById('memo-input');
  ta.addEventListener('input', () => {
    clearTimeout(memoTimer);
    memoTimer = setTimeout(() => {
      memoData[memoKey()] = ta.value;
      const ind = document.getElementById('memo-saved-indicator');
      ind.classList.add('show');
      setTimeout(() => ind.classList.remove('show'), 2000);
    }, 600);
  });
}

function showMemoModal() {
  // 현재 입력 중인 내용 먼저 저장
  memoData[memoKey()] = document.getElementById('memo-input').value;

  const entries = Object.entries(memoData)
    .filter(([, v]) => v && v.trim())
    .sort(([a],[b]) => a.localeCompare(b));

  const cont = document.getElementById('memo-modal-content');
  if (entries.length === 0) {
    cont.innerHTML = '<p style="color:var(--text2);font-size:0.85rem;padding:12px 0">저장된 메모가 없습니다.</p>';
  } else {
    cont.innerHTML = entries.map(([key, val]) => {
      const fri = fmt(addDays(new Date(key), 4));
      return `<div class="memo-list-item">
        <div class="memo-week-title">${key} (월) ~ ${fri} (금)</div>
        <div class="memo-text">${escHtml(val)}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('memo-modal').classList.add('show');
}

function saveMemoFile() {
  memoData[memoKey()] = document.getElementById('memo-input').value;

  const entries = Object.entries(memoData)
    .filter(([, v]) => v && v.trim())
    .sort(([a],[b]) => a.localeCompare(b));

  if (entries.length === 0) {
    alert('저장할 메모가 없습니다.');
    return;
  }

  let txt = '3,4과학 / 1,2체육 주별 메모\n';
  txt += '='.repeat(40) + '\n\n';
  entries.forEach(([key, val]) => {
    const fri = fmt(addDays(new Date(key), 4));
    txt += `【 ${key} ~ ${fri} 】\n`;
    txt += val.trim() + '\n\n';
    txt += '-'.repeat(40) + '\n\n';
  });

  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `시간표_메모_${fmt(today)}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function printMemos() {
  memoData[memoKey()] = document.getElementById('memo-input').value;

  const entries = Object.entries(memoData)
    .filter(([, v]) => v && v.trim())
    .sort(([a],[b]) => a.localeCompare(b));

  const rows = entries.map(([key, val]) => {
    const fri = fmt(addDays(new Date(key), 4));
    return `<div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #ccc">
      <div style="font-weight:700;margin-bottom:6px;color:#1a3050">${key} ~ ${fri}</div>
      <div style="white-space:pre-wrap;font-size:0.9rem">${escHtml(val)}</div>
    </div>`;
  }).join('');

  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ko"><head>
    <meta charset="UTF-8"><title>주별 메모</title>
    <style>body{font-family:'Malgun Gothic',sans-serif;padding:24px;color:#000;}</style>
  </head><body>
    <h2 style="margin-bottom:20px">3,4과학 / 1,2체육 주별 메모</h2>
    ${rows || '<p>저장된 메모가 없습니다.</p>'}
  </body></html>`);
  win.document.close();
  win.print();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════
// 합계
// ══════════════════════════════════════════════════════
let sumTab = 'week';

function setSumTab(tab) {
  sumTab = tab;
  document.querySelectorAll('.sum-tab').forEach((el,i) => {
    el.classList.toggle('active', ['week','sem1','sem2'][i] === tab);
  });
  renderSummary();
}

function renderSummary() {
  const counts = {};
  CLASSES.filter(c=>c!=='-').forEach(c => counts[c] = 0);

  const { start, end } = getSumRange();
  let d = new Date(start); d.setHours(0,0,0,0);
  const e = new Date(end); e.setHours(23,59,59,999);

  while (d <= e) {
    const dow = d.getDay();
    const ds  = fmt(d);
    if (dow >= 1 && dow <= 5 && !HOLIDAYS.has(ds)) {
      PERIODS.forEach((p, pi) => {
        if (p.label !== '점심') {
          const val = getCell(ds, pi);
          if (val && val !== '-' && counts[val] !== undefined) counts[val]++;
        }
      });
    }
    d.setDate(d.getDate()+1);
  }

  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  CLASSES.filter(c=>c!=='-').forEach(cls => {
    const card = document.createElement('div');
    card.className = 'sum-card';
    let sc = '';
    if (cls.includes('빛')) sc = 'sum-빛';
    else if (cls.includes('샘')) sc = 'sum-샘';
    else if (cls === '보충') sc = 'sum-보충';
    card.innerHTML = `<div class="sum-label">${cls}</div><div class="sum-val ${sc}">${counts[cls]}</div>`;
    grid.appendChild(card);
  });
}

function getSumRange() {
  const y = today.getFullYear();
  if (sumTab === 'week')  return { start: selectedMonday, end: addDays(selectedMonday, 4) };
  if (sumTab === 'sem1')  return { start: new Date(y,2,3),  end: new Date(y,6,22) };
  return                         { start: new Date(y,7,14), end: new Date(y,11,31) };
}

// ══════════════════════════════════════════════════════
// 연간 출력
// ══════════════════════════════════════════════════════
function showAnnual() {
  const content = document.getElementById('annual-content');
  content.innerHTML = '';
  const y = today.getFullYear();
  const ranges = [
    { label:`1학기 (${y}.03.03 ~ ${y}.07.22)`, start:new Date(y,2,3),  end:new Date(y,6,22)  },
    { label:`2학기 (${y}.08.14 ~ ${y}.12.31)`, start:new Date(y,7,14), end:new Date(y,11,31) },
  ];

  const totalCounts = {};
  CLASSES.filter(c=>c!=='-').forEach(c => totalCounts[c] = 0);

  ranges.forEach(range => {
    const h3 = document.createElement('h3');
    h3.style.cssText = 'color:var(--accent2);margin:14px 0 8px;font-size:0.92rem;';
    h3.textContent = range.label;
    content.appendChild(h3);

    const table = document.createElement('table');
    table.className = 'annual-table';
    let thead = '<thead><tr><th>날짜</th>';
    PERIODS.forEach(p => { if(p.label!=='점심') thead += `<th>${p.label}</th>`; });
    thead += '</tr></thead>';
    table.innerHTML = thead;

    const tbody  = document.createElement('tbody');
    const semCnt = {};
    CLASSES.filter(c=>c!=='-').forEach(c => semCnt[c] = 0);

    let cur = new Date(range.start); cur.setHours(0,0,0,0);
    const end = new Date(range.end); end.setHours(23,59,59,999);

    while (cur <= end) {
      const dow = cur.getDay();
      const ds  = fmt(cur);
      if (dow >= 1 && dow <= 5 && !HOLIDAYS.has(ds)) {
        const cells = [];
        let hasClass = false;
        PERIODS.forEach((p, pi) => {
          if (p.label === '점심') return;
          const val = getCell(ds, pi);
          cells.push(val);
          if (val && val !== '-') hasClass = true;
        });

        if (hasClass) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td style="color:var(--text2)">${ds} (${DAYS[dow-1]})</td>`;
          cells.forEach(val => {
            let c = '';
            if (val && val !== '-') {
              if (val.includes('빛')) c = 'cell-빛';
              else if (val.includes('샘')) c = 'cell-샘';
              else if (val === '보충') c = 'cell-보충';
              if (semCnt[val] !== undefined) { semCnt[val]++; totalCounts[val]++; }
            }
            tr.innerHTML += `<td class="${c}">${val}</td>`;
          });
          tbody.appendChild(tr);
        }
      }
      cur.setDate(cur.getDate()+1);
    }

    // 학기 합계 행
    const sumTr = document.createElement('tr');
    sumTr.style.cssText = 'background:rgba(79,195,247,0.07);font-weight:700;';
    const nonLunch = PERIODS.filter(p=>p.label!=='점심').length;
    let sumRow = '<td style="color:var(--accent2)">학기 합계</td>';
    sumRow += `<td colspan="${nonLunch}" style="text-align:left">`;
    sumRow += CLASSES.filter(c=>c!=='-').map(c => {
      let color = 'var(--text2)';
      if (c.includes('빛')) color = 'var(--빛)';
      else if (c.includes('샘')) color = 'var(--샘)';
      else if (c === '보충') color = 'var(--보충)';
      return `<span style="color:${color};margin-right:12px">${c}: ${semCnt[c]}</span>`;
    }).join('') + '</td>';
    sumTr.innerHTML = sumRow;
    tbody.appendChild(sumTr);

    table.appendChild(tbody);
    content.appendChild(table);
  });

  // 연간 전체 합계
  const totalDiv = document.createElement('div');
  totalDiv.style.cssText = 'margin-top:18px;padding:14px;background:var(--bg3);border-radius:12px;';
  totalDiv.innerHTML = '<h3 style="color:var(--accent);margin-bottom:10px;font-size:0.88rem">📊 연간 전체 합계</h3>';
  const tg = document.createElement('div');
  tg.style.cssText = 'display:flex;flex-wrap:wrap;gap:10px;';
  CLASSES.filter(c=>c!=='-').forEach(c => {
    let color = 'var(--text2)';
    if (c.includes('빛')) color = 'var(--빛)';
    else if (c.includes('샘')) color = 'var(--샘)';
    else if (c === '보충') color = 'var(--보충)';
    tg.innerHTML += `<div style="background:var(--card);border-radius:8px;padding:8px 16px;text-align:center;">
      <div style="font-size:0.7rem;color:var(--text2);margin-bottom:3px">${c}</div>
      <div style="font-size:1.35rem;font-family:'Bebas Neue',sans-serif;color:${color}">${totalCounts[c]}</div>
    </div>`;
  });
  totalDiv.appendChild(tg);
  content.appendChild(totalDiv);

  document.getElementById('annual-modal').classList.add('show');
}

  win.document.write(`<!DOCTYPE html><html lang="ko"><head>

    <style>

}
